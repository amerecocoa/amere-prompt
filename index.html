<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMÈRE Plot Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #1a0f0f, #3b1f1f, #2a1515);
  color: #f6e9e0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 90%;
  max-width: 900px;
  padding: 50px;
  background: rgba(30, 15, 15, 0.85);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.6);
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem;
  margin-bottom: 10px;
  text-align: center;
  letter-spacing: 2px;
}

.subtitle {
  text-align: center;
  margin-bottom: 40px;
  opacity: 0.7;
}

select, button {
  width: 100%;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 12px;
  border: none;
  font-size: 1rem;
}

select {
  background: #2e1b1b;
  color: #fff;
}

button {
  background: linear-gradient(135deg, #7a3e3e, #c98b6b);
  color: white;
  font-weight: 500;
  cursor: pointer;
  transition: 0.3s ease;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}

.prompt-box {
  margin-top: 30px;
  padding: 25px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  min-height: 120px;
  line-height: 1.6;
  font-size: 1.05rem;
  opacity: 0;
  transition: opacity 0.4s ease;
}

.prompt-box.show {
  opacity: 1;
}

.footer {
  margin-top: 30px;
  text-align: center;
  font-size: 0.8rem;
  opacity: 0.5;
}
</style>
</head>
<body>

<div class="container">
  <h1>AMÈRE</h1>
  <p class="subtitle">Prompts</p>

  <select id="jobSelect">
    <option value="">Select Your Role</option>
    <option value="Owner">Owner</option>
    <option value="Manager">Manager</option>
    <option value="Cashier">Cashier</option>
    <option value="Marketing">Marketing</option>
    <option value="Stocker">Stocker</option>
    <option value="Chocolatier">Chocolatier</option>
  </select>

  <button onclick="generatePrompt()">Generate Plot Idea</button>

  <div class="prompt-box" id="promptBox"></div>

  <div class="footer">AMÈRE — Where stories melt like chocolate.</div>
</div>

<script>

const usedPrompts = new Set();

const themes = [
  "a sudden VIP visit",
  "a mysterious anonymous order",
  "a viral social media controversy",
  "an unexpected ingredient shortage",
  "a luxury brand collaboration offer",
  "a staff conflict during peak hours",
  "a customer with hidden intentions",
  "a last-minute event booking",
  "a secret recipe discovery",
  "a broken refrigeration system at midnight",
  "a rival boutique spying on operations",
  "a surprise influencer review",
  "a missing shipment",
  "a loyal customer demanding change",
  "an internal betrayal",
  "a forgotten anniversary order",
  "a late-night confession between coworkers",
  "a chocolate competition invitation"
];

const tensions = [
  "forcing you to make a risky decision",
  "challenging your leadership skills",
  "testing your loyalty to the brand",
  "threatening the reputation of AMÈRE",
  "revealing hidden emotions",
  "pushing the team to their limits",
  "creating a moral dilemma",
  "exposing secrets within the staff",
  "risking financial stability",
  "turning a normal day into chaos"
];

function generatePrompt() {
  const job = document.getElementById("jobSelect").value;
  const box = document.getElementById("promptBox");

  if (!job) {
    box.innerHTML = "Please select a role first.";
    box.classList.add("show");
    return;
  }

  let prompt;
  let attempts = 0;

  do {
    const theme = themes[Math.floor(Math.random() * themes.length)];
    const tension = tensions[Math.floor(Math.random() * tensions.length)];

    prompt = `As the ${job} of AMÈRE, ${theme} unfolds, ${tension}. How do you handle the situation, and what consequences follow for you and the team?`;
    attempts++;
    if (attempts > 100) break;
  } while (usedPrompts.has(prompt));

  usedPrompts.add(prompt);

  box.innerHTML = prompt;
  box.classList.add("show");
}

</script>

</body>
</html>
